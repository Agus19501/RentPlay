<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear cuenta - RentPlay</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-page">
    <header class="header auth-header">
        <div class="header-container auth-header-container">
            <a href="home.html" class="logo auth-logo" aria-label="Ir al inicio">
                <span class="logo-icon">
                    <i class="fas fa-play"></i>
                </span>
                <span class="logo-text">rent<span class="logo-highlight">play</span></span>
            </a>

            <div class="auth-header-actions">
                <button class="language-btn auth-language-btn" type="button" aria-label="Cambiar idioma">
                    <span class="auth-flag" aria-hidden="true"></span>
                </button>
                <button class="user-btn auth-user-btn" type="button" aria-label="Perfil de usuario">
                    <i class="far fa-user-circle"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="auth-main">
        <section class="auth-shell">
            <article class="auth-form-panel">
                <h1 class="auth-title">CREAR UNA CUENTA</h1>
                <p class="auth-subtitle">
                    Ya tienes una cuenta?
                    <a href="login.html" class="auth-link">Accede</a>
                </p>

                <form class="auth-form" data-auth-form="register" novalidate>
                    <label class="sr-only" for="register-email">Correo electronico</label>
                    <input id="register-email" class="auth-input" type="email" name="email" placeholder="Correo Electronico" autocomplete="email" required>

                    <label class="sr-only" for="register-name">Nombre</label>
                    <input id="register-name" class="auth-input" type="text" name="name" placeholder="Nombre" autocomplete="name" required>

                    <label class="sr-only" for="register-password">Contrasena</label>
                    <input id="register-password" class="auth-input" type="password" name="password" placeholder="Contrasena" autocomplete="new-password" required>

                    <label class="sr-only" for="register-password-repeat">Repetir contrasena</label>
                    <input id="register-password-repeat" class="auth-input" type="password" name="passwordRepeat" placeholder="Repetir Contrasena" autocomplete="new-password" required>

                    <div class="auth-terms-row">
                        <label class="auth-checkbox">
                            <input type="checkbox" name="terms" required>
                            <span class="auth-checkmark" aria-hidden="true"></span>
                        </label>
                        <span class="auth-terms-text">Acepto los <a href="#" class="auth-link">terminos</a> del servicio</span>
                    </div>

                    <button type="submit" class="auth-submit">Crear una cuenta</button>
                </form>
            </article>

            <aside class="auth-hero-panel" aria-label="Mensaje de bienvenida">
                <h2 class="auth-hero-title">¡Bienvenido a RentPlay!</h2>
                <p class="auth-hero-line">
                    ¿Listo para darle al
                    <span class="auth-hero-play" aria-hidden="true">
                        <i class="fas fa-play"></i>
                    </span>
                    ?
                </p>
            </aside>
        </section>
    </main>

    <script src="assets/js/config.js"></script>
    <script src="assets/js/api-client.js"></script>
    <script src="assets/js/auth.js"></script>
</body>
</html>
